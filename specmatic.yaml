version: 3
dependencies:
  services:
    - service:
        $ref: "#/components/services/webBff"
        runOptions:
          $ref: "#/components/runOptions/webBffMock"
components:
  sources:
    webBffRepo:
      git:
        url: https://github.com/specmatic-demo/web-bff
        branch: migrated_to_federated_repo
  services:
    webBff:
      description: "Web BFF GraphQL dependency"
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/webBffRepo"
            specs:
              - spec:
                  path: "specs/schema.graphql"
  runOptions:
    webBffMock:
      graphqlsdl:
        type: mock
        host: localhost
        port: 4400
